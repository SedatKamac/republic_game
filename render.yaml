services:
  - type: web
    name: republic-game
    runtime: node
    buildCommand: bun install && bun run build
    startCommand: node entry.mjs
    envVars:
      - key: BUN_VERSION
        value: 1.3.4
      - key: NITRO_PRESET
        value: node-server
      - key: NODE_ENV
        value: production
